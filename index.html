<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trade Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📈 Trade Explorer</h1>
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">

  <p class="subtitle">Stock Market Dashboard</p>

  <!-- Controls -->
  <div class="controls">
    <button onclick="filterStocks('all')">All</button>
    <button onclick="filterStocks('gainers')">Gainers</button>
    <button onclick="filterStocks('losers')">Losers</button>
    <button onclick="sortStocks('price')">Price</button>
    <button onclick="sortStocks('change')">Change</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">

    <div class="card-box">
      <h3>📈 Bullish</h3>
      <div id="bullish"></div>
    </div>

    <div class="card-box">
      <h3>📉 Bearish</h3>
      <div id="bearish"></div>
    </div>

    <div class="card-box">
      <h3>⭐ Popular</h3>
      <div id="popular"></div>
    </div>

  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search stock...">
    <button onclick="searchStock()">Search</button>
  </div>

  <div id="stockData" class="result-card"></div>

</div>

<footer>
  <p>© 2026 Trade Explorer</p>
</footer>

<script src="script.js"></script>
</body>
</html>
